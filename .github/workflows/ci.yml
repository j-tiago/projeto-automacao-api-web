name: Pipeline de Testes Automatizados

# Define quando a pipeline vai rodar (ao fazer push para a branch main)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  executar-testes:
    runs-on: ubuntu-latest # A máquina virtual que o GitHub vai usar

    steps:
    # Passo 1: Baixar o seu código para a máquina virtual
    - name: Checkout do código
      uses: actions/checkout@v4

    # Passo 2: Instalar o Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11" # Pode ajustar para a versão que você usa

    # Passo 3: Instalar as bibliotecas do requirements.txt
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Passo 4: Rodar os testes de API
    - name: Rodar Testes de API
      run: pytest tests/api/ -v

    # Passo 5: Rodar os testes Web
    - name: Rodar Testes Web (E2E)
      run: pytest tests/web/ -v

      # Passo 6: Salvar o print se o teste web falhar
    - name: Salvar Print do Erro
      uses: actions/upload-artifact@v4
      if: failure() # Só roda esse passo se a pipeline ficar vermelha
      with:
        name: print-do-erro-web
        path: erro_tela.png